repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        language: system
        entry: uv run ruff check --fix
        types: [python]
      - id: ruff-format
        name: ruff-format
        language: system
        entry: uv run ruff format
        types: [python]
      - id: mypy
        name: mypy
        language: system
        entry: uv run mypy src/
        pass_filenames: false
      - id: pylint
        name: pylint
        language: system
        entry: uv run pylint src/
        pass_filenames: false
