name: Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install {{cookiecutter.python_version}}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run prek
        run: uv run prek run --all-files
